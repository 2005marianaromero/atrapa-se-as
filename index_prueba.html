<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atrapa la respuesta</title>

<style>
body{
text-align:center;
font-family:Arial;
background: linear-gradient(135deg, #74ebd5, #acb6e5);
}

#juego{
position:relative;
width:400px;
height:500px;
margin:auto;
background-color:#bbdefb;
overflow:hidden;
border-radius:10px;
border:3px solid #1976d2;
}

.palabra{
position:absolute;
color:white;
padding:10px;
border-radius:8px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

video{
margin-bottom:10px;
border-radius:10px;
}

#contenedor{
display:flex;
justify-content:center;
align-items:flex-start;
gap:30px;
margin-top:20px;
}

#ladoVideo{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

p{
font-size:20px;
font-weight:bold;
}

#vidas{
font-size:40px;
}

.info{
font-size:24px;
margin:10px;
color:black;
}

#vidas{
position:fixed;
top:20px;
right:30px;
font-size:45px;
z-index:9999;
}

#tiempoCaja{
position:fixed;
top:90px;
right:30px;
background:white;
padding:10px 20px;
border-radius:15px;
font-size:30px;
font-weight:bold;
box-shadow:0 0 10px rgba(0,0,0,0.3);
z-index:9999;
}

#barraTiempo{
position:fixed;
top:160px;
right:30px;
width:250px;
height:25px;
background:white;
border-radius:20px;
overflow:hidden;
border:3px solid #333;
z-index:9999;
}

#progresoTiempo{
width:100%;
height:100%;
background:limegreen;
transition:1s linear;
}

#pantallaInicio{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg, #74ebd5, #acb6e5);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10000;
}

#botonStart{
padding:20px 40px;
font-size:30px;
border:none;
border-radius:20px;
background:#ff9800;
color:white;
cursor:pointer;
transition:0.3s;
}

#botonStart:hover{
transform:scale(1.1);
background:#f57c00;
}

@media (max-width: 768px){

#contenedor{
flex-direction:column;
align-items:center;
}

#vidas{
position:static;
font-size:35px;
margin:10px;
}

#barraTiempo{
position:static;
width:250px;
margin:10px auto;
}

}

</style>
</head>

<body>

<div id="pantallaInicio">

<h1>🎯 Atrapa la respuesta</h1>

<button id="botonStart" onclick="iniciarJuego()">
▶ START
</button>

</div>

<h1>🎯 Atrapa la respuesta correcta</h1>

<div id="contenedor">

<div id="ladoVideo">
<h2>¿Qué significa esta seña?</h2>
<video id="videoSeña" width="200" autoplay muted loop></video>
</div>

<div id="juego"></div>

</div>

<p>Puntos: <span id="puntos">0</span></p>
<p>Nivel: <span id="nivel">1</span></p>
<div id="vidas">❤️❤️❤️</div>
<div id="barraTiempo">
    <div id="progresoTiempo"></div>
</div>

<script>

let juego = document.getElementById("juego")
let puntos = 0
let respuestaCorrecta = ""
let ultimaPregunta = -1
let vidas = 3
let tiempo = 30
let nivel = 1

let opcionesNivel = {
1: ["uno","dos","tres","cuatro","cinco","seis", "siete", "ocho", "nueve", "diez"],
2: ["ayudar","adios","buenas noches","buenos dias","favor","nombre", "querer", "también", "tienda"],
3: ["cual","cuando","cuantos","donde","preguntas","que", "quien", "por que", "para que"]
}

let niveles = {
1: [
{video: "videos/uno.mp4", respuesta: "uno"},
{video: "videos/dos.mp4", respuesta: "dos"},
{video: "videos/tres.mp4", respuesta: "tres"},
{video: "videos/cuatro.mp4", respuesta: "cuatro"},
{video: "videos/cinco.mp4", respuesta: "cinco"},
{video: "videos/seis.mp4", respuesta: "seis"},
{video: "videos/siete.mp4", respuesta: "siete"},
{video: "videos/ocho.mp4", respuesta: "ocho"},
{video: "videos/nueve.mp4", respuesta: "nueve"},
{video: "videos/diez.mp4", respuesta: "diez"}
],

2: [
{video: "videos/ayudar.mp4", respuesta: "ayudar"},
{video: "videos/adios.mp4", respuesta: "adios"},
{video: "videos/buenas_noches.mp4", respuesta: "buenas noches"},
{video: "videos/buenos_dias.mp4", respuesta: "buenos dias"},
{video: "videos/favor.mp4", respuesta: "favor"},
{video: "videos/nombre.mp4", respuesta: "nombre"},
{video: "videos/querer.mp4", respuesta: "querer"},
{video: "videos/tambien.mp4", respuesta: "también"},
{video: "videos/tienda.mp4", respuesta: "tienda"}
],

3: [
{video: "videos/cual.mp4", respuesta: "cual"},
{video: "videos/cuando.mp4", respuesta: "cuando"},
{video: "videos/cuantos.mp4", respuesta: "cuantos"},
{video: "videos/donde.mp4", respuesta: "donde"},
{video: "videos/preguntas.mp4", respuesta: "preguntas"},
{video: "videos/que.mp4", respuesta: "que"},
{video: "videos/quien.mp4", respuesta: "quien"},
{video: "videos/por_que.mp4", respuesta: "por que"},
{video: "videos/para_que.mp4", respuesta: "para que"}
]
}

function actualizarVidas(){

if(vidas === 3){
document.getElementById("vidas").innerText = "❤️❤️❤️"
}

if(vidas === 2){
document.getElementById("vidas").innerText = "❤️❤️"
}

if(vidas === 1){
document.getElementById("vidas").innerText = "❤️"
}

if(vidas === 0){
document.getElementById("vidas").innerText = ""
}

}

function nuevaPregunta(){
tiempo = 30

document.getElementById("progresoTiempo").style.width = "100%"
document.getElementById("progresoTiempo").style.background = "limegreen"

let lista = niveles[nivel]

let indice

do{
indice = Math.floor(Math.random()*lista.length)
}while(indice === ultimaPregunta)

ultimaPregunta = indice

let p = lista[indice]

let video = document.getElementById("videoSeña")

video.src = p.video
video.load()
video.play()

respuestaCorrecta = p.respuesta

}

function crearPalabra(){

let palabra = document.createElement("div")
palabra.classList.add("palabra")

let colores = ["#e53935","#8e24aa","#3949ab","#00897b","#fdd835","#fb8c00"]
let color = colores[Math.floor(Math.random()*colores.length)]

palabra.style.backgroundColor = color
palabra.style.border = "3px solid white"
palabra.style.boxShadow = "0 4px 10px rgba(0,0,0,0.3)"

let opciones = opcionesNivel[nivel]
let texto = opciones[Math.floor(Math.random()*opciones.length)]

palabra.innerText = texto

palabra.style.left = Math.random()*300 + "px"
palabra.style.top = "0px"

juego.appendChild(palabra)

let bajar = setInterval(()=>{

palabra.style.top = (palabra.offsetTop + 3) + "px"

if(palabra.offsetTop > 460){
palabra.remove()
clearInterval(bajar)
}

},50)

palabra.onclick = function(){

if(texto === respuestaCorrecta){

puntos++
document.getElementById("puntos").innerText = puntos

if(puntos === 3){
nivel = 2
document.getElementById("nivel").innerText = nivel
alert("Nivel 2 🚀")
}

if(puntos === 6){
nivel = 3
document.getElementById("nivel").innerText = nivel
alert("Nivel 3 🔥")
}

alert("¡Correcto! 🎉")
nuevaPregunta()

}else{

vidas--
actualizarVidas()

if(vidas === 0){
alert("Game Over 😢")
location.reload()
}

}

palabra.remove()
clearInterval(bajar)

}

}

function iniciarJuego(){

document.getElementById("pantallaInicio").style.display = "none"

nuevaPregunta()
actualizarVidas()

setInterval(crearPalabra,1000)

setInterval(()=>{

tiempo--

let porcentaje = (tiempo / 30) * 100
document.getElementById("progresoTiempo").style.width = porcentaje + "%"

if(tiempo <= 10){
document.getElementById("progresoTiempo").style.background = "red"
}

if(tiempo === 0){
alert("Se acabó el tiempo ⏰")
location.reload()
}

},1000)

}

</script>

</body>
</html>
